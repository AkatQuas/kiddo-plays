name: ops_tool_server
description: 餐饮系统 - 运维工具服务端
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0

flutter:

scripts:
  # To generate .g files:
  # Comment `builders` key on build.yaml before launch this command
  generate-code: dart run build_runner watch --delete-conflicting-outputs --verbose

dependencies:
  crypto: ^3.0.3
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_open_api:
  shelf_routing: ^1.0.0
  shelf_static: ^1.1.3
  shelf_swagger_ui: ^2.0.0
  json_annotation: ^4.9.0
  sqlite3: ^2.4.0
  path: ^1.9.0

dev_dependencies:
  mek_lints: ^5.0.0
  flutter_lints: ^3.0.0
  build_runner: ^2.7.0
  json_serializable: ^6.10.0
  shelf_open_api_generator:
  shelf_routing_generator:
  #  shelf_router_generator: ^1.1.1
