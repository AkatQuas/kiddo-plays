      name: 'actor.username'
  trigger-rule:
    or:
      - match:
          type: ip-whitelist
          ip-range: '13.52.5.96/28'
      - match:
          type: ip-whitelist
          ip-range: '13.236.8.224/28'
      - match:
          type: ip-whitelist
          ip-range: '18.136.214.96/28'
