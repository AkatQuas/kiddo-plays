<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>text-n-audio demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [data-tone='active'] { color: #7c3aed; }
      [data-tone='error'] { color: #dc2626; }
      [data-tone='ok'] { color: #16a34a; }
      [data-tone='wait'] { color: #ca8a04; }
      [data-tone='muted'] { color: #6b7280; }
      #mic-btn.recording {
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.25);
        background: #f5f3ff;
      }
      #tts-btn.playing {
        box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.2);
        background: #f0fdf4;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-2xl px-4 py-10">
      <header class="mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">🎙️ text-n-audio + 🔊 TTS</h1>
        <p class="mt-2 text-sm text-slate-500">
          语音输入（Whisper ASR）与文本朗读（Piper TTS）— 纯 HTML/JS + Express + 本地模型
        </p>
        <p id="health" class="mt-3 text-sm" data-tone="muted">检查服务…</p>
      </header>

      <!-- ASR -->
      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-3 text-sm font-medium text-slate-600">🎤 语音转文字</h2>
        <div class="flex items-center gap-3">
          <button
            id="mic-btn"
            type="button"
            class="flex h-12 w-12 items-center justify-center rounded-full border border-slate-200 text-xl transition hover:bg-slate-50"
            title="开始/停止录音"
          >
            🎤
          </button>
          <div id="visualizer-slot" class="hidden flex h-6 items-center"></div>
          <p id="status" class="text-sm" data-tone="muted">点击麦克风开始</p>
          <div class="flex-1"></div>
          <button
            id="clear-btn"
            type="button"
            class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50"
          >
            🗑️ 清空
          </button>
        </div>

        <div
          id="output"
          class="mt-5 min-h-[120px] whitespace-pre-wrap rounded-xl bg-slate-50 p-4 text-base leading-relaxed text-slate-800"
        ></div>
      </section>

      <!-- TTS -->
      <section class="mt-4 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-3 text-sm font-medium text-slate-600">🔊 文字转语音</h2>
        <div class="flex flex-wrap items-center gap-3">
          <button
            id="tts-btn"
            type="button"
            class="flex h-11 items-center gap-2 rounded-full border border-slate-200 px-4 text-sm transition hover:bg-slate-50"
            title="朗读上方文本"
          >
            <span id="tts-icon">▶️</span>
            <span id="tts-label">朗读文本</span>
          </button>
          <p id="tts-status" class="text-sm" data-tone="muted">SSE 流式 PCM 播放</p>
        </div>
        <p class="mt-3 text-xs text-slate-400">
          POST JSON → SSE base64 PCM16 → AudioWorklet 实时播放
        </p>
      </section>

      <section class="mt-6 rounded-xl border border-dashed border-slate-300 p-4 text-xs text-slate-500 leading-relaxed">
        <p><strong>ASR</strong>：AudioWorklet 每 ~2s 输出 WAV 分片，并行 POST <code>/api/transcribe</code>，文本增量追加。</p>
        <p class="mt-2"><strong>TTS</strong>：点击朗读，将上方文本 POST 到 <code>/api/tts/stream</code>，边收边播。</p>
      </section>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
