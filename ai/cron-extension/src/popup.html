<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .header button:hover { background: #1a5276; }
    .content { padding: 8px 0; }
    .task {
      padding: 10px 16px;
      border-bottom: 1px solid #16213e;
    }
    .task:last-child { border-bottom: none; }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .task-name { font-weight: 500; }
    .task-schedule { color: #8892b0; font-size: 11px; font-family: monospace; }
    .task-meta { font-size: 11px; color: #8892b0; }
    .task-actions { display: flex; gap: 6px; margin-top: 6px; }
    .task-actions button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }
    .task-actions button:hover { background: #1a5276; }
    .status-ok { color: #4ecdc4; }
    .status-error { color: #ff6b6b; }
    .logs-section { border-top: 1px solid #0f3460; }
    .logs-header {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #8892b0;
      cursor: pointer;
      user-select: none;
    }
    .logs-header:hover { color: #e0e0e0; }
    .log-entry {
      padding: 4px 16px;
      font-size: 11px;
      font-family: monospace;
      color: #8892b0;
      border-bottom: 1px solid #16213e;
    }
    .log-entry:last-child { border-bottom: none; }
    .hidden { display: none; }
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #8892b0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cron Tasks</h1>
    <button id="reloadBtn">Reload Config</button>
  </div>
  <div class="content" id="taskList"></div>
  <div class="logs-section">
    <div class="logs-header" id="logsToggle">Recent Logs ▸</div>
    <div id="logsContainer" class="hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
