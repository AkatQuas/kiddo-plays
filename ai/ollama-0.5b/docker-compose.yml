version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-intel-test
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
